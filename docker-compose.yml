services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [internal]

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    networks: [internal]

  admin-panel:
    build:
      context: .
      dockerfile: admin-panel.Dockerfile
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    expose:
      - "80"
    networks: [internal]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8088:80"
      - "8443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      admin-panel:
        condition: service_started
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
